<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curtidas</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
    <button hx-post="/curtir"
            hx-target="#contador"
            hx-swap="outerHTML">
        Curtir!
    </button>
    <button hx-delete="/curtir"
            hx-target="#contador"
            hx-swap="outerHTML"
            hx-confirm="Tem Certeza?">
        Zerar curtidas
    </button>
    <p id="contador">{{ curtidas }}</p>
</body>
</html>
