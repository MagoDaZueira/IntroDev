<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rei das Abas</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        nav { background: #f0f0f0; padding: 10px; }
        nav button { margin: 0 5px; padding: 10px; cursor: pointer; }
        nav button.active { background: #ccc; }
        .tab-content { padding: 20px; }
    </style>
	<link rel="stylesheet" href="/static/jupiter/styles.css">
	<link rel="stylesheet" href="/static/professor/styles.css">
</head>
<body>
    <header>
        <nav>
            <button hx-get="/curtidas" hx-target="#content" hx-swap="innerHTML" class="tab-button active" id="curtidas-btn">Curtidas</button>
            <button hx-get="/jupiter" hx-target="#content" hx-swap="innerHTML" class="tab-button" id="jupiter-btn">Júpiter</button>
            <button hx-get="/professor" hx-target="#content" hx-swap="innerHTML" class="tab-button" id="professor-btn">Professor</button>
        </nav>
    </header>
    <div id="content" class="tab-content">
        <button hx-post="/curtir"
                hx-target="#contador"
                hx-swap="outerHTML">
            Curtir!
        </button>
        <button hx-delete="/curtir"
                hx-target="#contador"
                hx-swap="outerHTML"
                hx-confirm="Tem Certeza?">
            Zerar curtidas
        </button>
        <p id="contador">{{ curtidas }}</p>
    </div>
    <script>
        function activateButtons(e) {
            if (e.detail.requestConfig.path === '/curtidas') {
                document.getElementById('curtidas-btn').classList.add('active');
            } else if (e.detail.requestConfig.path === '/jupiter') {
                document.getElementById('jupiter-btn').classList.add('active');
            } else if (e.detail.requestConfig.path === '/professor') {
                document.getElementById('professor-btn').classList.add('active');
            }
        }
        document.addEventListener('htmx:afterSwap', (e) => {
            activateButtons(e);
            let activeCount = document.querySelectorAll('.tab-button.active').length;
            if (activeCount > 1) {
                document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
                activateButtons(e);
            }
        });
        let tabs = ['curtidas-btn', 'jupiter-btn', 'professor-btn'];
        let currentTab = 0;
        document.addEventListener('keydown', (e) => {
            // if (e.shiftKey && e.altKey && e.key === 'P') {
            // No meu pc só funciona desse jeito absurdo aq embaixo
            // Certamente tem um jeito melhor mas vou procurar não
            if (e.shiftKey && e.altKey && e.key === '∏') {
                e.preventDefault();
                currentTab = (currentTab + 1) % tabs.length;
                document.getElementById(tabs[currentTab]).click();
            }
        });
    </script>
</body>
</html>
