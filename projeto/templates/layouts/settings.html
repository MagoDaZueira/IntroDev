<div class="screen">
	<h1>Settings</h1>
	{% if not active_username %}
		{% include 'atomic/suggest_login.html' %}
	{% else %}
		<button class="red-button"
				hx-post="/logout">
			Logout
		</button>
		<button class="red-button"
				hx-delete="/user/{{ active_username }}"
				hx-confirm="Are you sure you want to delete your account? This action cannot be undone.">
			Delete Account
		</button>
	{% endif %}
</div>
