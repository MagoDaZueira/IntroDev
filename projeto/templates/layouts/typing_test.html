<div class="screen" id="typing-screen">
<h1>The Typist</h1>
{% if not active_username %}
	{% include 'atomic/suggest_login.html' %}
{% else %}
	<div id="size-chooser">
		<label for="length-input">Word Amount (10-100):</label>
		<input 
			id="length-input"
			type="text"
			value="{{ length }}"
			autocomplete="off"
			hx-get="/"
			hx-trigger="input changed delay:1000ms"
			hx-target="#main-content"
			hx-swap="innerHTML swap:0.2s"
			hx-push-url="false"
			name="length"
		/>
	</div>
	<div id="typing-container" data-text='{{ text }}'>
		<div id="text-display"></div>
		<div id="cursor"></div>
		<input id="hidden-input" type="text" autocomplete="off"/>
	</div>
{% endif %}
</div>
