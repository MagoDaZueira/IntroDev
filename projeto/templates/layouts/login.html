<div class="screen">
	<h1>Login</h1>
	<form hx-post="/login"
		  hx-trigger="submit"
		  hx-target="#error"
		  hx-swap="innerHTML">
		<input type="text" name="username" placeholder="Username">
		<input type="password" name="password" placeholder="Password">
		<button type="submit">Login</button>
	</form>
	<div id="suggest-link">Don't have an account yet?
		<a	hx-target="#main-content"
			hx-push-url="true"
			hx-swap="innerHTML"
			hx-get="{{ url_for('get_signup') }}"
			class="standard-link">
			Sign up
		</a>
	</div>

	<div id="error"></div>
</div>
