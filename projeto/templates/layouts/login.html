<div>
	<h1>Login</h1>
	<form hx-post="/login"
		  hx-trigger="submit"
		  hx-target="#error"
		  hx-swap="innerHTML">
		<input type="text" name="username" placeholder="Username">
		<input type="password" name="password" placeholder="Password">
		<button type="submit">Login</button>
	</form>

	<div id="signup-suggest">Don't have an account yet? <a href="{{ url_for('get_signup') }}">Sign up</a></div>

	<div id="error"></div>
</div>
