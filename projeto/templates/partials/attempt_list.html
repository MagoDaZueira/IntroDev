{% for attempt in attempts %}
	<div class="attempt">
		<span>{{ attempt.wpm }}</span>
		<span>{{ attempt.accuracy }}%</span>
		<span>{{ attempt.duration }}s</span>
		<span>{{ attempt.date.strftime('%Y-%m-%d %H:%M') }}</span>
	</div>
{% endfor %}

{% if attempts|length == 10 %}
	<div hx-get="/user/{{ username }}/attempts?offset={{ next_offset }}"
		 hx-trigger="revealed"
		 hx-target="this"
		 hx-swap="outerHTML">
	</div>
{% endif %}
