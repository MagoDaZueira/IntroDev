{% for attempt in attempts %}
	<div class="attempt">
		<span>{{ attempt.wpm }} WPM</span>
		<span>{{ attempt.accuracy }}%</span>
		<span>{{ attempt.date }}</span>
	</div>
{% endfor %}

{% if attempts|length == 10 %}
	<div hx-get="/user/{{ username }}/attempts?offset={{ next_offset }}"
		 hx-trigger="revealed"
		 hx-target="this"
		 hx-swap="afterend">
	</div>
{% endif %}
