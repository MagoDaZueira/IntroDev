<form hx-patch="/user/{{ user.username }}/edit"
	  hx-trigger="submit"
	  hx-target="#edit-profile"
	  hx-swap="innerHTML">

	<input type="text" name="new_username" placeholder="New Username" value="{{ user.username }}">
	<input type="text" name="new_bio" placeholder="New Bio" value="{{ user.bio }}">

	<button hx-get="/clear"
			hx-target="closest form"
			hx-swap="outerHTML"
			type="button">
		Cancel
	</button>
	<button type="submit">Save</button>
</form>
